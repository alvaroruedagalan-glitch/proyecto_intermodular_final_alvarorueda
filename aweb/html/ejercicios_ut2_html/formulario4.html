<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Formularios</h1>
    <p>Formulario con INPUT RADIO</p>
    <br><br>
    <form name="primero" method="post" action="https://www.institutos.es/para.php">
        <fieldset>
            <legend>Input Radio</legend>
            <p>¿Cuál es tu color favorito?</p>

            Rojo <input type="radio" name="color" value="rojo" checked>
            Verde <input type="radio" name="color" value="verde"> 
            Azul <input type="radio" name="color" value="azul">
            Rosa <input type="radio" name="color" value="rosa"><br>
            <br>
            <p>¿Cuál es tu marca de coches favorita?</p>
            Ford <input type="radio" name="marca" value="ford">
            Renault <input type="radio" name="marca" value="Renault">
            BMW <input type="radio" name="marca" value="bmw">
            Ferrari <input type="radio" name="marca" value="ferrari" checked><br><br>

            <input type="submit" value="Enviar">
            <input type="reset" value="Limpiar">
        </fieldset>
    </form>
</body>
</html>
