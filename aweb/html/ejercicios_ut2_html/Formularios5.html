<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>Formularios</h1>
<p>Formulario con lista de opciones</p>
<hr>
<form name="primero" method="post" action="https://www.institutos.es/para.php">

    <fieldset>
        <legend>Etiqueta select: Listas</legend>
        <label for="opciones">Lista desplegable para seleccionar una opción:</label>
        <select name="opciones" id="opciones">
            <option value="1:rojo">Rojo</option>
            <option value="2:verde">Verde</option>
            <option value="3:azul">Azul</option>
            <option value="4:rosa">Rosa</option>
            <option value="5:blanco">Blanco</option>
            <option value="6:blanco">Blanco</option>
            <option value="6:negro">Negro</option>
        </select>
        <br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpiar">
    </fieldset>
</form>
<hr>
</body>
</html>
