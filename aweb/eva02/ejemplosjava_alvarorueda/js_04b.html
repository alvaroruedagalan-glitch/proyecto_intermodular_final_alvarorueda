<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJERCICIO JS 04B </title>
</head>
<body>

    <h1>Variables en JavaScript</h1>

    <script>
        let edad = 16;
        let nombre = "Álvaro";
        let aprobado = true;
        let nota;

        document.write("Edad: " + edad + "<br>");
        document.write("Nombre: " + nombre + "<br>");
        document.write("¿Aprobado?: " + aprobado + "<br>");
        document.write("Nota: " + nota + "<br>");

        edad = 17;
        document.write("Nueva edad: " + edad + "<br>");
    </script>

    <p>Con este ejemplo podemos ver como las variables pueden cambiar en el navegador.</p>

</body>
</html>
