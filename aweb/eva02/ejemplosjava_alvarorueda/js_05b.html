<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EJ JS 05B</title>
</head>
<body>

<h1>Variables y Constantes</h1>

<script>
    const nombreCentro = "IES Ribera del Tajo";
    const curso = "1º SMR";

    let alumno = "Álvaro";
    let edad = 16;

    document.write("Centro: " + nombreCentro + "<br>");
    document.write("Curso: " + curso + "<br>");
    document.write("Alumno: " + alumno + "<br>");
    document.write("Edad: " + edad + "<br>");

    alumno = "Paco";
    edad = 17;

    document.write("<br>Alumno nuevo: " + alumno + "<br>");
    document.write("Nueva edad: " + edad + "<br>");
</script>

<p>Son como unas fichas de alumno, las constantes son el centro y el curso ya que son fijos, mientras que nombres, edad... son varuiables.</p>

</body>
</html>
