<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio JS 09</title>

    <script>
        let n1 = 10;
    </script>

</head>
<body>

    <h1>Incremento y decremento</h1>

    <script>
        document.write("Valor inicial: " + n1 + "<br>");
        n1++;
        document.write("Después de n1++: " + n1 + "<br>");
        n1--;
        document.write("Después de n1--: " + n1 + "<br>");
    </script>

    <p>son contadores automaticos que restan o suman 1 al numero que pongas. &copy;Álvaro Rueda</p>
</body>
</html>
