<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio JS 08</title>

    <script>
        let n1 = 10;
        let n2 = 3;
        let n3 = -4; 
        let res;
    </script>

</head>
<body>

    <h1>Operadores matemáticos</h1>

    <script>
        res = n1 + n2;
        document.write("Suma: " + res + "<br>");

        res = n1++

        res = n1 - n2;
        document.write("Resta: " + res + "<br>");

        res = n1 * n2;
        document.write("Multiplicación: " + res + "<br>");

        res = n1 / n2;
        document.write("División: " + res + "<br>");

        res = n1 % n2;
        document.write("Resto: " + res + "<br>");
    </script>

    <p>Tenemos la suma, división, resta, multiplicación y el resto final, ese es el script, para hacer operaciones matematicas. &copy;Álvaro rueda</p>

</body>
