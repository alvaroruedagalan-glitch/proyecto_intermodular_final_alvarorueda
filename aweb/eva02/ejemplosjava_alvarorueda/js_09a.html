<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio JS 09a</title>

    <script>
        let n1 = 10;
    </script>

</head>
<body>

<h1>Preincremento y postincremento</h1>

<script>
    document.write("Valor inicial: " + n1 + "<br>");
    document.write("n1++ devuelve: " + n1++ + " ahora n1 vale: " + n1 + "<br>");
    document.write("++n1 devuelve: " + ++n1 + "<br>");
</script>

<p>el n1++ se muestra siempre primero, pero se suma el segundo. el ++n1 se suma primero pero se muestra segundo. &copy;Álvaro Rueda </p>

</body>
</html>
