<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio JS 04</title>
</head>
<body>

    <h1>Ejemplo de JavaScript</h1>

    <script>
        let edad = 16;
        let nombre = "Álvaro";
        let verdadero = true;
        let nada;

        alert(edad);
        alert(nombre);
        alert(verdadero);
        alert(nada);
    </script>

    <p>El let son variables que con el alert se muestran en una ventana emergente.</p>

</body>
