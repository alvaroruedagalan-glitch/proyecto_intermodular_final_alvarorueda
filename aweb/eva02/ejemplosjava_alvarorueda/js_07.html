<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio JS 07</title>

    <script>
        let nombre = "Álvaro";
        let apellidos = "Rueda";
        let todo;
    </script>

</head>
<body>

    <h1>Ejemplo de JavaScript</h1>

    <script>
        todo = nombre + " " + apellidos;
        document.write("Te llamas: <strong>" + todo + "</strong>");
    </script>

    <p>El script une las variables para formar varias palabras, en este caso un nombre y apellido.</p>

</body>
</html>
