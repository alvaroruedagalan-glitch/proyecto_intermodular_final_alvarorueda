<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio JS 04a</title>

    <script>
        let edad = 16;
        let nombre = "Álvaro";
        let verdadero = true;
        let nada;
    </script>

</head>
<body>

    <h1>Ejemplo de JavaScript</h1>

    <script>
        document.write("La edad es: " + edad + "<br>");
        document.write("El nombre es: " + nombre + "<br>");
        document.write("El valor de verdadero es: " + verdadero + "<br>");
        document.write("Nada tiene " + nada + "<br>");
    </script>

    <p>En vez de mostrarse en ventanas emergentes la informacion, ahora se puede ver directamente en el html.</p>

</body>
</html>
