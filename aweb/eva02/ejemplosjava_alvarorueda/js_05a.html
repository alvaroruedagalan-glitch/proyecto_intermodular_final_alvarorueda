<h1>Constantes en JavaScript</h1>

<script>
    const diasSemana = 7;
    const pi = 3.14;

    document.write("Días de la semana: " + diasSemana + "<br>");
    document.write("Valor de PI: " + pi + "<br>");
</script>

<p>Const establece constantes, es decir que no se pueden cambiar o que den otro número o información. &copy;Álvaro Rueda</p>
