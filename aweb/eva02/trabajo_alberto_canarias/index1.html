<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pROYECTO COMPARADOR</title>
</head>
<body>
  <h1>Proyecto número</h1>  
    <p>Tu número:</p>
    <input type="number" name="" id="numero">

    <button onclick="comparador()">Comparador de 20</button>
    <button onclick="parOImpar()">Par o impar</button>
    <button onclick="borrar()">Borrar número</button>
     <p id="resultado"></p>
    <br><br>
    <script>
        function comparador(){
            let numero = document.getElementById("numero").value;
            if (numero > 20){
                document.getElementById("resultado").innerHTML = "El número es mayor que 20.";
            }
            else if (numero < 20){
                document.getElementById("resultado").innerHTML = "El numero es menor que 20.";
            }
            else{
                document.getElementById("resultado").innerHTML = "El numero es igual a 20";
            }
        }

        function parOImpar(){
            let numero = document.getElementById("numero").value;
            if (numero % 2 == 0){
                document.getElementById("resultado").innerHTML = "El numero es par";
            }
            else{
                document.getElementById("resultado").innerHTML = "El numero es impar";
            }
        }
        function borrar(){
            document.getElementById("resultado").innerHTML = "";
            document.getElementById("numero").value = "";
        }
    </script>
</body>
</html>
